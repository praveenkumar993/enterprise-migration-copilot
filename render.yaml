services:
  - type: web
    name: enterprise-migration-copilot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: HF_USERNAME
        value: praveends
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: HF_HUB_DISABLE_SYMLINKS_WARNING
        value: "1"
    healthCheckPath: /health
    autoDeploy: true